apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  namespace: demo-waste
spec:
  serviceName: cache
  replicas: 2
  selector: { matchLabels: { app: cache } }
  template:
    metadata: { labels: { app: cache } }
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            requests: { cpu: 250m, memory: 256Mi }
