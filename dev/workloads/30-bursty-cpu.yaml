# Bursts ~1 core for 20s every ~2 minutes, idles otherwise.
# Tests P95/P99 logic and the confidence column -- naive averages lie here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-bursty
  namespace: demo-waste
spec:
  replicas: 1
  selector: { matchLabels: { app: worker-bursty } }
  template:
    metadata: { labels: { app: worker-bursty } }
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                end=$(( $(date +%s) + 20 ))
                while [ $(date +%s) -lt $end ]; do :; done
                sleep 100
              done
          resources:
            requests: { cpu: 1000m, memory: 128Mi }
